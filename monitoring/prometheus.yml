global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100

  - job_name: api
    static_configs:
      - targets:
          - api:8000
    metrics_path: /metrics
